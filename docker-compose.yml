version: '3'

services:
  site:
    build:
      context: .
    restart: unless-stopped
    working_dir: /site
    ports:
      - "8080:8080"
      - "9999:9999"
    volumes:
      - ./:/site
      - /site/node_modules
    ulimits:
      nofile:
        soft: 999999
        hard: 999999
    depends_on:
      - redis

  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:

